# Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: wateroman-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ADMIN_DEFAULT_PASSWORD
        value: admin123
